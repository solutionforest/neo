name: Desktop CI

# Slice 1 scope: prove the Tauri scaffold's frontend and Rust shell build. The
# full cross-platform matrix (macOS build, native smoke tests, signing) arrives
# with the release-engineering slice. Path filters keep this off CLI-only PRs.
on:
  push:
    branches: [plan/neo-desktop-tray-app, main]
    paths:
      - "apps/desktop/**"
      - "cmd/neo-bridge/**"
      - "internal/operations/**"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "cmd/neo-bridge/**"
      - "internal/operations/**"
      - ".github/workflows/desktop-ci.yml"

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/desktop

jobs:
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build

  windows-build:
    name: Windows x64 compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: npm ci
      # generate_context!() embeds the built frontend at compile time, so the
      # dist bundle must exist before the Rust build.
      - run: npm run build
      - name: Compile Tauri shell (x86_64-pc-windows-msvc)
        run: cargo build --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
