<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="40%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="logo-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="58%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Logo icon (N) -->
  <g transform="translate(100, 165)">
    <rect width="80" height="80" rx="22" fill="url(#logo-g)"/>
    <path d="M22.5 58.5V22.5h8.75l17.5 25.6V22.5h8.75v36h-8.75L31.25 33V58.5H22.5Z" fill="white"/>
  </g>
  <!-- Title: Neo -->
  <text x="200" y="215" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white">Neo</text>
  <!-- Subtitle: by Vxero -->
  <text x="200" y="250" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#60a5fa">by Vxero</text>
  <!-- Tagline -->
  <text x="100" y="310" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#94a3b8">Deploy to any VPS from your terminal.</text>
  <text x="100" y="350" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#94a3b8">SSH-native. No agent. No control plane.</text>
  <!-- Terminal preview -->
  <g transform="translate(100, 400)">
    <rect width="1000" height="140" rx="12" fill="#111827" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Terminal dots -->
    <circle cx="24" cy="20" r="5" fill="#ef4444"/>
    <circle cx="42" cy="20" r="5" fill="#eab308"/>
    <circle cx="60" cy="20" r="5" fill="#22c55e"/>
    <!-- Command -->
    <text x="24" y="65" font-family="JetBrains Mono, monospace" font-size="20" fill="#22c55e">$</text>
    <text x="44" y="65" font-family="JetBrains Mono, monospace" font-size="20" fill="#e2e8f0">neo deploy --env-file .env.production</text>
    <!-- Output -->
    <text x="24" y="100" font-family="JetBrains Mono, monospace" font-size="18" fill="#4ade80">✓</text>
    <text x="44" y="100" font-family="JetBrains Mono, monospace" font-size="18" fill="#94a3b8">Loaded 14 env vars from docker-compose.yml</text>
    <text x="24" y="125" font-family="JetBrains Mono, monospace" font-size="18" fill="#4ade80">✓</text>
    <text x="44" y="125" font-family="JetBrains Mono, monospace" font-size="18" fill="#94a3b8">App live at https://myapp.example.com</text>
  </g>
  <!-- Bottom branding -->
  <text x="1100" y="600" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#475569" text-anchor="end">vxero.com/neo</text>
</svg>
